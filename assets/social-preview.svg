<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Lock icon (shield shape) -->
  <g transform="translate(640, 180)" text-anchor="middle">
    <!-- Shield outline -->
    <path d="M0,-70 L50,-50 L50,15 Q50,55 0,75 Q-50,55 -50,15 L-50,-50 Z"
          fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>
    <!-- Lock body -->
    <rect x="-18" y="-8" width="36" height="28" rx="4" fill="url(#accent)" opacity="0.9"/>
    <!-- Lock shackle -->
    <path d="M-12,-8 L-12,-20 Q-12,-32 0,-32 Q12,-32 12,-20 L12,-8"
          fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <!-- Keyhole -->
    <circle cx="0" cy="6" r="5" fill="#0f172a"/>
    <rect x="-2.5" y="6" width="5" height="10" rx="1" fill="#0f172a"/>
  </g>

  <!-- Title -->
  <text x="640" y="310" text-anchor="middle"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-size="72" font-weight="700" fill="#f8fafc" letter-spacing="-1">
    bx
  </text>

  <!-- Tagline -->
  <text x="640" y="370" text-anchor="middle"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-size="28" fill="#94a3b8" font-weight="400">
    Sandbox any macOS app
  </text>

  <!-- Subline -->
  <text x="640" y="410" text-anchor="middle"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-size="20" fill="#64748b" font-weight="400">
    Only your project directory stays accessible
  </text>

  <!-- Terminal preview -->
  <g transform="translate(390, 450)">
    <rect width="500" height="48" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
    <text x="20" y="30"
          font-family="SF Mono, Menlo, Monaco, monospace"
          font-size="18" fill="#6ee7b7">$</text>
    <text x="40" y="30"
          font-family="SF Mono, Menlo, Monaco, monospace"
          font-size="18" fill="#e2e8f0"> bx claude ~/work/my-project</text>
  </g>

  <!-- Bottom labels -->
  <g transform="translate(640, 560)" text-anchor="middle">
    <text font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif"
          font-size="15" fill="#475569" letter-spacing="3">
      VSCODE · CLAUDE CODE · XCODE · TERMINAL · ANY APP
    </text>
  </g>

  <!-- Accent line top -->
  <rect x="540" y="0" width="200" height="3" fill="url(#accent)" rx="1"/>
</svg>
