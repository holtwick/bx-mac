# ~/.bxconfig.toml - bx app configuration
#
# Each [<name>] section becomes a mode: bx <name> [workdir...]
# Built-in modes (code, xcode, term, claude, exec) are always available
# and can be overridden here.
#
# Resolution order:
#   1. path     - explicit absolute path (wins if set)
#   2. bundle   - mdfind auto-discovery (+ optional binary inside .app)
#   3. fallback - hardcoded path (last resort)
#
# Find a bundle id: osascript -e 'id of app "AppName"'

# --- Built-in overrides (optional) ---

# [code]
# path = "/usr/local/bin/code"

# [xcode]
# paths = ["~/work/my-ios-app"]

# --- Electron editors ---
# --no-sandbox is auto-injected for Electron apps.

[cursor]
bundle = "com.todesktop.230313mzl4w4u92"

[windsurf]
bundle = "com.exafunction.windsurf"

# --- Native editors ---

[zed]
bundle = "dev.zed.Zed"

# --- Claude Desktop (Anthropic native app) ---
# passPaths = false - Claude Desktop does not take workdirs as CLI args,
# the workdir only scopes the sandbox.

[claude-desktop]
bundle = "com.anthropic.claudefordesktop"
passPaths = false

# --- Workdir shortcuts ---
# A section with only `paths` (no mode/bundle/path) implicitly uses `code`.
# Perfect for one-key project launchers: `bx myproject`.

# [myproject]
# paths = ["~/work/my-project", "~/work/shared-lib"]

# Explicit parent via `mode` when you want a different editor:

# [myios]
# mode = "xcode"
# paths = ["~/work/my-ios-app"]

# --- Project groups (same editor, different sets) ---
# Define several shortcuts pointing at related repo clusters.
# Globs keep the list short; individual paths can be toggled by
# commenting them out in place.

# [frontend]
# paths = [
#   "~/work/web-*",          # glob: all matching repos
#   "~/work/shared-ui",
#   # "~/work/legacy-ui",    # temporarily disabled
# ]
# background = true

# --- passPaths = N pattern ---
# Sandbox many directories but only open the first N as editor args.
# Useful when the editor should focus on one repo while sibling
# repos stay accessible (for imports, local deps, symlinks).

# [main]
# passPaths = 1
# paths = [
#   "~/work/app",            # opened in the editor
#   "~/work/shared-lib",     # sandboxed, not opened
#   "~/work/design-tokens",
# ]

# --- Field reference ---
# mode       - inherit from another app
# path       - explicit absolute executable path
# bundle     - macOS bundle id for mdfind
# binary     - relative path inside .app (default: Contents/MacOS/<AppName>)
# fallback   - absolute fallback path
# args       - extra launch args
# passPaths  - true (all workdirs) | false | N (first N) | ["~/p1", ...]
# paths      - default workdirs when none given on CLI (supports ~ and globs)
# background - run detached, log to /tmp/bx-<pid>.log
# profile    - true (~/.vscode-sandbox) | "custom/path" for isolated data
