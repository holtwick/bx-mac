# ~/.bxconfig.toml — bx app configuration
#
# Define applications that can be launched in the sandbox.
# Each [<name>] section becomes available as: bx <name> [workdir...]
# The [apps.<name>] prefix also works for backward compatibility.
#
# Resolution order for finding the app executable:
#   1. path    — explicit absolute path (highest priority)
#   2. bundle  — auto-discovery via macOS Spotlight (mdfind)
#              + binary (relative path inside .app bundle)
#   3. fallback — hardcoded absolute path (last resort)

# --- Built-in apps (these are the defaults, override as needed) ---

[code]
  bundle = "com.microsoft.VSCode"
  binary = "Contents/MacOS/Electron"
  fallback = "/Applications/Visual Studio Code.app/Contents/MacOS/Electron"
  args = [
    "--no-sandbox",
  ]
  # workdirs = ["~/work/project-a", "~/work/shared-lib"]

[xcode]
  bundle = "com.apple.dt.Xcode"
  binary = "Contents/MacOS/Xcode"
  fallback = "/Applications/Xcode.app/Contents/MacOS/Xcode"
  passWorkdirs = false
  # workdirs = ["~/work/my-ios-app"]

# --- Finding bundle IDs ---
# Run: osascript -e 'id of app "AppName"'
# Using bundle IDs is recommended over paths — they survive app updates,
# relocations, and name changes.

# --- Examples for additional apps ---

# [cursor]
# bundle = "com.todesktop.230313mzl4w4u92"
# binary = "Contents/MacOS/Cursor"
# args = ["--no-sandbox"]
# passWorkdirs = true
# workdirs = ["~/work/project-b"]

# [zed]
# bundle = "dev.zed.Zed"
# binary = "Contents/MacOS/zed"

# [fleet]
# path = "/Applications/Fleet.app/Contents/MacOS/Fleet"

# [sublime]
# bundle = "com.sublimetext.4"
# binary = "Contents/MacOS/sublime_text"

# --- Workdir shortcuts (inherit from another app via mode) ---
# Only workdirs needed — everything else is inherited from the referenced app.

# [myproject]
# mode = "code"
# workdirs = ["~/work/my-project", "~/work/shared-lib"]

# [ios]
# mode = "xcode"
# workdirs = ["~/work/my-ios-app"]

# --- background option ---
# background = true — run the app detached (like nohup &), output goes to /tmp/bx-<pid>.log
# Can also be enabled per-invocation with: bx --background <mode> [workdir...]

# [myserver]
# mode = "exec"
# background = true
# workdirs = ["~/work/my-server"]

# --- passWorkdirs options ---
# true    — all workdirs are passed as launch arguments (default)
# false   — no workdirs are passed (e.g. xcode)
# "first" — only the first workdir is passed (sandbox covers all)

# [web]
# bundle = "com.example.browser"
# binary = "Contents/MacOS/Browser"
# args = ["--no-sandbox"]
# passWorkdirs = "first"
# workdirs = ["~/work/main-project", "~/work/shared-deps"]
